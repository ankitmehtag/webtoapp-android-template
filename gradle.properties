# Project-wide Gradle settings.
# This file is committed so both local dev and the Docker build image use the same config.

# ── JVM heap ──────────────────────────────────────────────────────────────────
# 3 GB keeps the Kotlin compiler and aapt2 comfortable in a container.
# Reduce to -Xmx2g if your dev machine is memory-constrained.
org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# ── Build performance ──────────────────────────────────────────────────────────
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true

# ── AndroidX ──────────────────────────────────────────────────────────────────
android.useAndroidX=true
android.enableJetifier=false

# ── Kotlin ────────────────────────────────────────────────────────────────────
kotlin.code.style=official
kotlin.incremental=true
