name: Build APK

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: "App record ID from WebToApp"
        required: true
      website_url:
        description: "Website URL to embed"
        required: true
      app_name:
        description: "App display name"
        required: true
      package_name:
        description: "Android package name (e.g. com.example.myapp)"
        required: true
      webhook_url:
        description: "Webhook URL to notify on completion"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout template
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Inject website URL into MainActivity.kt
        run: |
          sed -i 's|url = "https://www.google.com"|url = "${{ inputs.website_url }}"|g' \
            app/src/main/java/com/example/webtoapp/MainActivity.kt

      - name: Inject app name into strings.xml
        run: |
          sed -i 's|<string name="app_name">WebToApp</string>|<string name="app_name">${{ inputs.app_name }}</string>|g' \
            app/src/main/res/values/strings.xml

      - name: Inject applicationId into build.gradle.kts
        run: |
          sed -i 's|applicationId = "com.example.webtoapp"|applicationId = "${{ inputs.package_name }}"|g' \
            app/build.gradle.kts

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find . -name "*.apk" -path "*/debug/*" | head -1)
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and upload APK
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="build-${{ inputs.app_id }}"
          # Create release
          gh release create "$TAG" \
            --title "Build: ${{ inputs.app_name }}" \
            --notes "Auto-built from ${{ inputs.website_url }}" \
            --prerelease \
            "${{ steps.apk.outputs.path }}#app-debug.apk"
          # Get download URL
          APK_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/app-debug.apk"
          echo "apk_url=$APK_URL" >> $GITHUB_OUTPUT

      - name: Notify webhook — success
        if: success()
        run: |
          curl -s -X POST "${{ inputs.webhook_url }}" \
            -H "Content-Type: application/json" \
            -H "x-webhook-secret: ${{ secrets.WEBHOOK_SECRET }}" \
            -d "{\"app_id\":\"${{ inputs.app_id }}\",\"status\":\"completed\",\"apk_url\":\"${{ steps.release.outputs.apk_url }}\"}"

      - name: Notify webhook — failure
        if: failure()
        run: |
          curl -s -X POST "${{ inputs.webhook_url }}" \
            -H "Content-Type: application/json" \
            -H "x-webhook-secret: ${{ secrets.WEBHOOK_SECRET }}" \
            -d "{\"app_id\":\"${{ inputs.app_id }}\",\"status\":\"failed\",\"error\":\"GitHub Actions build failed.\"}"
