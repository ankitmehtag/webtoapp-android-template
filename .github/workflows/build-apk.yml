name: Build APK

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: "App record ID from WebToApp"
        required: true
      website_url:
        description: "Website URL to embed"
        required: true
      app_name:
        description: "App display name"
        required: true
      package_name:
        description: "Android package name (e.g. com.example.myapp)"
        required: true
      webhook_url:
        description: "Webhook URL to notify on completion"
        required: true
      primary_color:
        description: "Primary/splash colour as hex (e.g. #6366F1)"
        required: false
        default: "#6366F1"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout template
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      - name: Cache Gradle project output
        uses: actions/cache@v4
        with:
          path: |
            .gradle
            app/build/intermediates
            app/build/kotlin
            app/build/tmp
          key: gradle-out-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-out-

      - name: Inject website URL into Config.kt
        run: |
          sed -i 's|const val URL = "https://www.google.com"|const val URL = "${{ inputs.website_url }}"|g' \
            app/src/main/java/com/example/webtoapp/Config.kt

      - name: Inject primary colour into Config.kt and colors.xml
        run: |
          COLOR="${{ inputs.primary_color }}"
          if [ -z "$COLOR" ]; then COLOR="#6366F1"; fi
          # Config.kt — SPLASH_BG_COLOR and PRIMARY_COLOR
          sed -i "s|const val SPLASH_BG_COLOR = \"#6366F1\"|const val SPLASH_BG_COLOR = \"${COLOR}\"|g" \
            app/src/main/java/com/example/webtoapp/Config.kt
          sed -i "s|const val PRIMARY_COLOR = \"#6366F1\"|const val PRIMARY_COLOR = \"${COLOR}\"|g" \
            app/src/main/java/com/example/webtoapp/Config.kt
          # colors.xml — static resource for the splash screen theme
          sed -i "s|<color name=\"splash_background\">#6366F1</color>|<color name=\"splash_background\">${COLOR}</color>|g" \
            app/src/main/res/values/colors.xml

      - name: Inject deep link host into AndroidManifest.xml
        run: |
          HOST=$(echo "${{ inputs.website_url }}" | sed 's|https\?://||' | sed 's|/.*||')
          sed -i "s|android:host=\"www.google.com\"|android:host=\"${HOST}\"|g" \
            app/src/main/AndroidManifest.xml

      - name: Inject app name into strings.xml
        run: |
          sed -i 's|<string name="app_name">WebToApp</string>|<string name="app_name">${{ inputs.app_name }}</string>|g' \
            app/src/main/res/values/strings.xml

      - name: Inject applicationId into build.gradle.kts
        run: |
          sed -i 's|applicationId = "com.example.webtoapp"|applicationId = "${{ inputs.package_name }}"|g' \
            app/build.gradle.kts

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --build-cache \
            --parallel \
            -x lint \
            -x test \
            -x testDebugUnitTest

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find . -name "*.apk" -path "*/debug/*" | head -1)
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Delete existing release if tag exists
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TAG="build-${{ inputs.app_id }}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin --delete "refs/tags/$TAG" 2>/dev/null || true

      - name: Create GitHub Release and upload APK
        id: release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TAG="build-${{ inputs.app_id }}"
          gh release create "$TAG" \
            --title "Build: ${{ inputs.app_name }}" \
            --notes "Auto-built from ${{ inputs.website_url }}" \
            --prerelease \
            "${{ steps.apk.outputs.path }}#app-debug.apk"
          APK_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/app-debug.apk"
          echo "apk_url=$APK_URL" >> $GITHUB_OUTPUT

      - name: Notify webhook — success
        if: success()
        run: |
          curl -s -X POST "${{ inputs.webhook_url }}" \
            -H "Content-Type: application/json" \
            -H "x-webhook-secret: ${{ secrets.WEBHOOK_SECRET }}" \
            -d "{\"app_id\":\"${{ inputs.app_id }}\",\"status\":\"completed\",\"apk_url\":\"${{ steps.release.outputs.apk_url }}\"}"

      - name: Notify webhook — failure
        if: failure()
        run: |
          curl -s -X POST "${{ inputs.webhook_url }}" \
            -H "Content-Type: application/json" \
            -H "x-webhook-secret: ${{ secrets.WEBHOOK_SECRET }}" \
            -d "{\"app_id\":\"${{ inputs.app_id }}\",\"status\":\"failed\",\"error\":\"GitHub Actions build failed.\"}"
